name: Deploy VPS (backend + compose)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      # NOTE: base docker-compose.yml is intentionally NOT synced — the repo copy is
      # dev-oriented (builds backend from ./backend, which does not exist on the VPS).
      # Only the prod override below is repo-managed and safe to ship.
      - 'docker-compose.score-editor-image.yml'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ourtextscores/ourtextscores-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-vps:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # Only the PROD OVERRIDE is synced. It contains no secrets (only ${VAR} interpolation
      # resolved from the VPS .env at runtime). The base docker-compose.yml is deliberately
      # NOT shipped: the repo copy builds the backend from ./backend, which does not exist on
      # the VPS, so overwriting the bespoke prod base file breaks `up -d backend`.
      - name: Stage prod override on VPS
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            docker-compose.score-editor-image.yml \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            set -e
            cd /opt/ourtextscores

            # --- Reconcile ONLY the prod override; back up before overwrite; never touch
            #     .env or the bespoke base docker-compose.yml ---
            COMPOSE_CHANGED=0
            f=docker-compose.score-editor-image.yml
            if ! sudo cmp -s "/tmp/$f" "/opt/ourtextscores/$f"; then
              echo "Prod override changed: $f (backing up before overwrite)"
              sudo cp -a "/opt/ourtextscores/$f" "/opt/ourtextscores/$f.bak.$(date +%Y%m%d%H%M%S)" || true
              sudo cp "/tmp/$f" "/opt/ourtextscores/$f"
              COMPOSE_CHANGED=1
            fi
            rm -f "/tmp/$f"

            # --- Backend image: always pull + recreate (uses the bespoke base file as-is) ---
            sudo docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            sudo docker compose up -d backend

            # --- Editor API: recreate ONLY when compose changed (avoid needless restarts).
            #     Uses BOTH -f files so the prod override + env mapping apply. Image rollout
            #     itself stays manual (see OTS_Web BUILD_EMBED.md / runbook Appendix A);
            #     this only re-applies compose/env changes to the existing pinned image. ---
            if [ "$COMPOSE_CHANGED" = "1" ]; then
              echo "Recreating score_editor_api to apply compose changes..."
              sudo docker compose \
                -f docker-compose.yml -f docker-compose.score-editor-image.yml \
                up -d score_editor_api
            fi

            # --- Health check (backend) ---
            echo "Waiting for backend to be healthy..."
            for i in {1..30}; do
              if sudo docker compose ps backend | grep -q "healthy"; then
                echo "Backend is healthy!"
                exit 0
              fi
              echo "Attempt $i/30: Backend not healthy yet, waiting..."
              sleep 2
            done

            echo "Warning: Backend did not become healthy within 60 seconds"
            sudo docker compose logs backend --tail=50
            exit 1
          EOF

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Verify deployment
        if: success()
        run: |
          echo "✅ VPS deploy complete (backend + compose reconciled)!"
          echo "🔍 Check status at: https://api.ourtextscores.com/api/health"
