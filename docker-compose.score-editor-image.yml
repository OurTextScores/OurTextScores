services:
  # Production-style override for score_editor_api.
  # Usage:
  #   docker compose -f docker-compose.yml -f docker-compose.score-editor-image.yml up -d score_editor_api
  # Requires Docker Compose v2 with !reset merge support.
  score_editor_api:
    container_name: ourtextscores_score_editor_api
    image: ${OTS_EDITOR_API_IMAGE:-ghcr.io/ourtextscores/ots-web-editor-api}:${OTS_EDITOR_API_IMAGE_TAG:-latest}
    command:
      - npm
      - run
      - start
      - --
      - --hostname
      - 0.0.0.0
      - --port
      - "3000"
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      MUSIC_XML2ABC_SCRIPT: ${MUSIC_XML2ABC_SCRIPT:-/opt/notagen/data/xml2abc.py}
      MUSIC_ABC2XML_SCRIPT: ${MUSIC_ABC2XML_SCRIPT:-/opt/notagen/data/abc2xml.py}
      MUSESCORE_WRAPPER_TIMEOUT_SECONDS: ${MUSESCORE_WRAPPER_TIMEOUT_SECONDS:-300}
      MUSIC_MUSESCORE_TIMEOUT_MS: ${MUSIC_MUSESCORE_TIMEOUT_MS:-120000}
      MUSIC_MUSESCORE_BIN: ${MUSIC_MUSESCORE_BIN:-musescore4}
      MUSIC_MUSESCORE_BIN_CANDIDATES: ${MUSIC_MUSESCORE_BIN_CANDIDATES:-musescore4,mscore4portable,musescore3,musescore}
      MUSIC_MUSESCORE_USE_XVFB: ${MUSIC_MUSESCORE_USE_XVFB:-true}
      MUSIC_HARMONY_PYTHON: ${MUSIC_HARMONY_PYTHON:-python3}
      MUSIC_HARMONY_SCRIPT: ${MUSIC_HARMONY_SCRIPT:-/app/tools/music21_harmony/analyze_harmony.py}
      MUSIC_HARMONY_TIMEOUT_MS: ${MUSIC_HARMONY_TIMEOUT_MS:-180000}
      MUSIC_NOTAGEN_SPACE_TOKEN: ${MUSIC_NOTAGEN_SPACE_TOKEN:-}
      MUSIC_NOTAGEN_DEFAULT_SPACE_ID: ${MUSIC_NOTAGEN_DEFAULT_SPACE_ID:-jhlusko/NotaGen-Space}
      NEXT_PUBLIC_SCORE_EDITOR_API_BASE: ${NEXT_PUBLIC_SCORE_EDITOR_API_BASE:-/api/score-editor}
      NEXT_PUBLIC_SOUNDFONT_CDN_URL: ${NEXT_PUBLIC_SOUNDFONT_CDN_URL:-https://cdn.ourtextscores.com/soundfonts/default.sf2}
      OTEL_ENABLED: ${SCORE_EDITOR_OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: ${SCORE_EDITOR_OTEL_SERVICE_NAME:-ots-web-score-editor-api}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}
    volumes: !reset []
    ports:
      - "127.0.0.1:4010:3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
