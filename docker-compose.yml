services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
        NEXT_PUBLIC_SCORE_EDITOR_URL: ${NEXT_PUBLIC_SCORE_EDITOR_URL:-http://localhost:3000/score-editor}
        SCORE_EDITOR_API_ORIGIN: ${SCORE_EDITOR_API_ORIGIN:-http://score_editor_api:3000}
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - INTERNAL_API_URL=http://backend:4000/api
    container_name: ourtextscores_frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - backend
      - score_editor_api
    networks:
      - appnet

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ourtextscores_backend
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      # Optional email server for NextAuth + notifications
      EMAIL_SERVER: ${EMAIL_SERVER:-smtp://mailpit:1025}
      # For heavy scores, allow MuseScore exports to run without hard timeout in local dev.
      MUSESCORE_EXPORT_TIMEOUT_MS: ${MUSESCORE_EXPORT_TIMEOUT_MS:-0}
      MUSESCORE_WRAPPER_TIMEOUT_SECONDS: ${MUSESCORE_WRAPPER_TIMEOUT_SECONDS:-0}
      # PDF can be generated later so upload requests are not blocked by this step.
      MUSESCORE_PDF_MODE: ${MUSESCORE_PDF_MODE:-async}
      # Humdrum/Kern (.krn) converter wrapper; converts to MusicXML for editor/viewers.
      KERN_CONVERTER_CLI: ${KERN_CONVERTER_CLI:-krn2musicxml}
      KERN_CONVERTER_TIMEOUT_MS: ${KERN_CONVERTER_TIMEOUT_MS:-60000}
      # Maintenance switch: disable only IMSLP refresh rate limit when true.
      DISABLE_IMSLP_REFRESH_RATE_LIMIT: ${DISABLE_IMSLP_REFRESH_RATE_LIMIT:-false}
      # Disable upload rate limiting for bulk imports (comma-separated rule names).
      RATE_LIMIT_DISABLED_RULES: ${RATE_LIMIT_DISABLED_RULES:-}
      # OpenTelemetry (optional)
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-ourtextscores-backend}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}
    depends_on:
      - mongo
      - meili
      - minio
      - mailpit
    volumes:
      - ../fossil_data:/data/fossil_data
    networks:
      - appnet

  score_editor_api:
    image: node:20-bookworm
    container_name: ourtextscores_score_editor_api
    working_dir: /app
    command: >
      sh -lc "
      apt-get update &&
      apt-get install -y python3-pyparsing &&
      npm install &&
      npm run dev -- --hostname 0.0.0.0 --port 3000
      "
    environment:
      BUILD_MODE: ${BUILD_MODE:-}
      NEXT_PUBLIC_BUILD_MODE: ${NEXT_PUBLIC_BUILD_MODE:-}
      MUSIC_XML2ABC_SCRIPT: ${MUSIC_XML2ABC_SCRIPT:-/opt/notagen/data/xml2abc.py}
      MUSIC_ABC2XML_SCRIPT: ${MUSIC_ABC2XML_SCRIPT:-/opt/notagen/data/abc2xml.py}
      MUSIC_NOTAGEN_SPACE_TOKEN: ${MUSIC_NOTAGEN_SPACE_TOKEN:-}
      MUSIC_NOTAGEN_DEFAULT_SPACE_ID: ${MUSIC_NOTAGEN_DEFAULT_SPACE_ID:-jhlusko/NotaGen-Space}
      NEXT_PUBLIC_SCORE_EDITOR_API_BASE: ${NEXT_PUBLIC_SCORE_EDITOR_API_BASE:-/api/score-editor}
      NEXT_PUBLIC_SOUNDFONT_CDN_URL: ${NEXT_PUBLIC_SOUNDFONT_CDN_URL:-https://cdn.ourtextscores.com/soundfonts/default.sf2}
      # OpenTelemetry pass-through for score editor API runtime (when enabled there)
      OTEL_ENABLED: ${SCORE_EDITOR_OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: ${SCORE_EDITOR_OTEL_SERVICE_NAME:-ots-web-score-editor-api}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}
    volumes:
      - ../OTS_Web:/app
      - ../NotaGen:/opt/notagen:ro
    ports:
      - "127.0.0.1:4010:3000"
    networks:
      - appnet

  mongo:
    image: mongo:7
    container_name: ourtextscores_mongo
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - ../mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-ots}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-change_me}
    networks:
      - appnet

  meili:
    image: getmeili/meilisearch:v1.7.2
    container_name: ourtextscores_meili
    restart: unless-stopped
    ports:
      - "7700:7700"
    volumes:
      - ../meilisearch_data:/meili_data
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-meili_master_key}
    networks:
      - appnet

  minio:
    image: minio/minio:RELEASE.2024-04-18T19-09-19Z
    container_name: ourtextscores_minio
    restart: unless-stopped
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - ../minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    networks:
      - appnet

  mailpit:
    image: axllent/mailpit:latest
    container_name: ourtextscores_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"  # web UI
      - "1025:1025"  # SMTP
    networks:
      - appnet

networks:
  appnet:
    driver: bridge
